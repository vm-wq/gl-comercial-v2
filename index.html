    // ══════════════════════════════════════════════════════════════
    // INDEXEDDB UTILITIES
    // ══════════════════════════════════════════════════════════════

    const DB_NAME = 'GLComercialV2';
    const DB_VERSION = 3;

    const initDB = () => {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);

        req.onerror = () => reject(req.error);
        req.onsuccess = () => resolve(req.result);

        req.onupgradeneeded = (e) => {
          const db = e.target.result;

          const stores = [
            { name: 'users', keyPath: 'id' },
            { name: 'entities', keyPath: 'id' },
            { name: 'calls', keyPath: 'id' },
            { name: 'visits', keyPath: 'id' },
            { name: 'nps', keyPath: 'id' },
            { name: 'routes', keyPath: 'id' },
            { name: 'feed', keyPath: 'id' },
            { name: 'managerVisits', keyPath: 'id' },
            { name: 'config', keyPath: 'id' },
            { name: 'chatSessions', keyPath: 'id' },
            { name: 'protocols', keyPath: 'id' },
          ];

          stores.forEach(store => {
            if (!db.objectStoreNames.contains(store.name)) {
              const s = db.createObjectStore(store.name, { keyPath: store.keyPath });
              // Add indexes for performance
              if (store.name === 'entities') {
                s.createIndex('type', 'type', { unique: false });
                s.createIndex('region', 'region', { unique: false });
              }
              if (store.name === 'calls') {
                s.createIndex('entityId', 'entityId', { unique: false });
                s.createIndex('date', 'date', { unique: false });
                s.createIndex('userId', 'userId', { unique: false });
              }
              if (store.name === 'visits') {
                s.createIndex('clinicId', 'clinicId', { unique: false });
                s.createIndex('date', 'date', { unique: false });
              }
              if (store.name === 'nps') {
                s.createIndex('entityId', 'entityId', { unique: false });
              }
              if (store.name === 'users') {
                s.createIndex('email', 'email', { unique: true });
              }
            }
          });
        };
      });
    };

    const dbAdd = (db, storeName, data) => {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).add(data);
        req.onerror = () => reject(req.error);
        req.onsuccess = () => resolve(req.result);
      });
    };

    const dbPut = (db, storeName, data) => {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).put(data);
        req.onerror = () => reject(req.error);
        req.onsuccess = () => resolve(req.result);
      });
    };

    const dbGetAll = (db, storeName) => {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).getAll();
        req.onerror = () => reject(req.error);
        req.onsuccess = () => resolve(req.result);
      });
    };

    const dbGet = (db, storeName, key) => {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).get(key);
        req.onerror = () => reject(req.error);
        req.onsuccess = () => resolve(req.result);
      });
    };

    const dbDelete = (db, storeName, key) => {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).delete(key);
        req.onerror = () => reject(req.error);
        req.onsuccess = () => resolve();
      });
    };

    // Password hashing
    const hashPassword = async (pw) => {
      if (typeof dcodeIO !== 'undefined' && dcodeIO.bcrypt) {
        return dcodeIO.bcrypt.hashSync(pw, 10);
      }
      // Fallback: SHA-256
      const data = new TextEncoder().encode(pw);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    };

    const verifyPassword = async (pw, hash) => {
      if (typeof dcodeIO !== 'undefined' && dcodeIO.bcrypt) {
        return dcodeIO.bcrypt.compareSync(pw, hash);
      }
      const pwHash = await hashPassword(pw);
      return pwHash === hash;
    };

    // Input sanitization
    const sanitize = (str) => {
      if (typeof str !== 'string') return '';
      const escMap = {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'};
      return str.replace(/[<>&"']/g, c => escMap[c]).substring(0, 1000);
    };

    // Debounce utility
    const debounce = (fn, ms) => {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), ms);
      };
    };

    // Form validation
    const validateForm = (data, rules) => {
      const errors = {};
      Object.entries(rules).forEach(([field, rule]) => {
        const val = data[field];
        if (rule.required && (!val || !String(val).trim())) errors[field] = rule.label + ' is required';
        else if (rule.minLength && val && val.length < rule.minLength) errors[field] = rule.label + ' min ' + rule.minLength + ' chars';
        else if (rule.maxLength && val && val.length > rule.maxLength) errors[field] = rule.label + ' max ' + rule.maxLength + ' chars';
        else if (rule.type === 'number' && val && isNaN(Number(val))) errors[field] = rule.label + ' must be a number';
        else if (rule.type === 'email' && val && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) errors[field] = 'Invalid email';
      });
      return errors;
    };

      const { t } = useLang();
      const [isRecording, setIsRecording] = React.useState(false);
      const [recognition, setRecognition] = React.useState(null);

      React.useEffect(() => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          const rec = new SpeechRecognition();
          rec.continuous = true;
          rec.interimResults = true;
          let interimTranscript = '';

          rec.onstart = () => setIsRecording(true);
          rec.onend = () => setIsRecording(false);

          rec.onresult = (evt) => {
            interimTranscript = '';
            for (let i = evt.resultIndex; i < evt.results.length; i++) {
              const transcript = evt.results[i][0].transcript;
              if (evt.results[i].isFinal) {
                onChange((value || '') + ' ' + transcript);
              } else {
                interimTranscript += transcript;
              }
            }
          };

          rec.onerror = (evt) => {
            console.error('Speech recognition error:', evt.error);
            setIsRecording(false);
          };

          setRecognition(rec);
        }
      }, [onChange]);

      const toggleRecording = () => {
        if (!recognition) return;
        if (isRecording) {
          recognition.stop();
          setIsRecording(false);
        } else {
          recognition.start();
          setIsRecording(true);
        }

    const HomePage = ({ t, db, user, lang, dataVersion }) => {
      const [stats, setStats] = React.useState({
        totalClinics: 0,
        totalBusinesses: 0,
        visitsThisMonth: 0,
        callsThisMonth: 0,
        npsAverage: 0,
        pendingFollowups: 0,
      });
      const [suggestions, setSuggestions] = React.useState([]);

      React.useEffect(() => {
        const loadStats = async () => {
          const entities = await dbGetAll(db, 'entities');
          const calls = await dbGetAll(db, 'calls');
          const visits = await dbGetAll(db, 'visits');
          const npsData = await dbGetAll(db, 'nps');

          const now = new Date();
          const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
          const thirtyDaysAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);

          const clinics = entities.filter(e => e.type === 'clinic');
          const businesses = entities.filter(e => e.type === 'business');
          const callsThisMonth = calls.filter(c => new Date(c.date) >= monthStart);
          const visitsThisMonth = visits.filter(v => new Date(v.date) >= monthStart);
          const npsAvg = npsData.length > 0
            ? (npsData.reduce((sum, n) => sum + n.score, 0) / npsData.length).toFixed(1)
            : 0;

          // Compute suggestions
          const sug = [];

          // Clinics not visited in 30+ days
          const notVisited = clinics.filter(c => {
            const lastVisit = visits.filter(v => v.entityName === c.name).sort((a, b) => new Date(b.date) - new Date(a.date))[0];
            return !lastVisit || new Date(lastVisit.date) < thirtyDaysAgo;
          });
          if (notVisited.length > 0) {
            sug.push({ type: 'noVisits', count: notVisited.length, npsAvg });
          }

          // NPS dropped
          if (npsAvg < 7) {
            sug.push({ type: 'npsDrop', npsAvg });
          }

          // Pending follow-ups (using calls as proxy)
          const weekStart = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
          const pending = calls.filter(c => new Date(c.date) >= weekStart && c.reason === 'Follow-up').length;
          if (pending > 0) {
            sug.push({ type: 'pending', count: pending });
          }

          setStats({
            totalClinics: clinics.length,
            totalBusinesses: businesses.length,
            visitsThisMonth: visitsThisMonth.length,
            callsThisMonth: callsThisMonth.length,
            npsAverage: npsAvg,
            pendingFollowups: pending,
          });
          setSuggestions(sug.slice(0, 4));
        };

        loadStats();
      }, [db, dataVersion]);

      return (
        <div className="p-4 space-y-4">
          {/* Welcome Banner */}
          <div className="rounded-2xl overflow-hidden flex items-center justify-between" style={{background:'#46ac33',minHeight:120}}>
            <div className="px-6 py-4">
              <h1 className="text-2xl font-extrabold text-white">{t.welcome || 'Welcome'}, {user.name}!</h1>
              <p className="text-white/80 mt-1 text-sm">{new Date().toLocaleDateString(lang === 'pt' ? 'pt-BR' : 'en-US', {weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
            </div>
            <img src="Banner Img.png" alt="" className="h-28 w-auto object-contain pr-4 hidden sm:block"/>
          </div>

          {/* Stats Grid */}
          <div className="grid grid-cols-2 gap-3">
            <Card>
              <div className="text-3xl font-bold text-navy">{stats.totalClinics}</div>
              <p className="text-sm text-gray-600 mt-1">🏥 {t.totalClinics}</p>
            </Card>
            <Card>
              <div className="text-3xl font-bold text-navy">{stats.totalBusinesses}</div>
              <p className="text-sm text-gray-600 mt-1">💼 {t.totalBusinesses}</p>
            </Card>
            <Card>
              <div className="text-3xl font-bold text-navy">{stats.visitsThisMonth}</div>
              <p className="text-sm text-gray-600 mt-1">📍 {t.visitsThisMonth}</p>
            </Card>
            <Card>
              <div className="text-3xl font-bold text-navy">{stats.callsThisMonth}</div>
              <p className="text-sm text-gray-600 mt-1">📞 {t.callsThisMonth}</p>
            </Card>
            <Card>
              <div className="text-3xl font-bold text-gl">{stats.npsAverage}</div>
              <p className="text-sm text-gray-600 mt-1">⭐ {t.npsAvg}</p>
            </Card>
            <Card>
              <div className="text-3xl font-bold text-amber-600">{stats.pendingFollowups}</div>
              <p className="text-sm text-gray-600 mt-1">⏱️ {t.pendingFollowups}</p>
            </Card>
          </div>

          {/* AI Suggestions */}
          {suggestions.length > 0 && (
            <Card className="bg-blue-50 border border-blue-200">
              <h3 className="font-bold text-navy mb-3 flex items-center gap-2">
                <Icon name="bolt" size={18} /> {t.aiSuggestions}
              </h3>
              <div className="space-y-2">
                {suggestions.map((sug, i) => (
                  <div key={i} className="text-sm text-gray-700 p-2 bg-white rounded border border-blue-100">
                    {sug.type === 'noVisits' && (
                      <div>🔴 <strong>{sug.count}</strong> {t.noVisitsFor30Days}</div>
                    )}
                    {sug.type === 'npsDrop' && (
                      <div>📉 {t.npsDropped} <strong>{sug.npsAvg}</strong> — {t.reviewDetractors}</div>
                    )}
                    {sug.type === 'pending' && (
                      <div>✋ <strong>{sug.count}</strong> {t.pendingFollowupsWeek}</div>
                    )}
                  </div>
                ))}
              </div>
            </Card>
          )}

          {/* Quick Actions */}
          <div className="space-y-2 pt-4">
            <h3 className="font-bold text-navy px-2">{t.actions}</h3>
            <Button className="w-full justify-center"><Icon name="plus" size={18} /> {t.newCall}</Button>
            <Button className="w-full justify-center"><Icon name="plus" size={18} /> {t.newVisit}</Button>
            <Button className="w-full justify-center"><Icon name="plus" size={18} /> {t.newSurvey}</Button>
          </div>
        </div>
      );
    };

    const CalendarPage = ({ t, db, user, dataVersion }) => {
      const [currentDate, setCurrentDate] = React.useState(new Date());
      const [activities, setActivities] = React.useState({});
      const [selectedDay, setSelectedDay] = React.useState(null);

      React.useEffect(() => {
        const loadActivities = async () => {
          const calls = await dbGetAll(db, 'calls');
          const visits = await dbGetAll(db, 'visits');
          const nps = await dbGetAll(db, 'nps');
          const allEvents = [...calls, ...visits, ...nps];
          const grouped = {};
          allEvents.forEach(e => {
            if (e.date) {
              grouped[e.date] = (grouped[e.date] || 0) + 1;
            }
          });
          setActivities(grouped);
        };
        loadActivities();
      }, [db, dataVersion]);

      const daysInMonth = (d) => new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
      const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
      const days = Array.from({ length: daysInMonth(currentDate) }, (_, i) => i + 1);
      const monthName = currentDate.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });

      const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1));
      const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1));

      const getDayKey = (day) => {
        const d = new Date(currentDate.getFullYear(), currentDate.getMonth(), day);
        return d.toISOString().split('T')[0];
      };

      return (
        <div className="p-4 space-y-4">
          <div className="flex justify-between items-center mb-4">
            <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded"><Icon name="arrow_back" size={20} /></button>
            <h2 className="font-bold text-navy">{monthName}</h2>
            <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded"><Icon name="arrow_forward" size={20} /></button>
          </div>

          <div className="grid grid-cols-7 gap-1 mb-4">
            {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => <div key={d} className="text-xs font-bold text-center text-gray-600">{d}</div>)}
            {Array(firstDay).fill(null).map((_, i) => <div key={`empty-${i}`}></div>)}
            {days.map(day => {
              const key = getDayKey(day);
              const count = activities[key];
              return (
                <button
                  key={day}

    const NPSPage = ({ t, db, user, dataVersion }) => {
      const [surveys, setSurveys] = React.useState([]);
      const [showNewSurvey, setShowNewSurvey] = React.useState(false);
      const [stats, setStats] = React.useState({ avg: 0, promoters: 0, passives: 0, detractors: 0, total: 0 });

      React.useEffect(() => {
        const loadSurveys = async () => {
          const allSurveys = await dbGetAll(db, 'nps');
          setSurveys(allSurveys.sort((a, b) => new Date(b.date) - new Date(a.date)));

          const total = allSurveys.length;
          const avg = total > 0 ? (allSurveys.reduce((sum, s) => sum + s.score, 0) / total).toFixed(1) : 0;
          const promoters = allSurveys.filter(s => s.score >= 9).length;
          const passives = allSurveys.filter(s => s.score >= 7 && s.score <= 8).length;
          const detractors = allSurveys.filter(s => s.score <= 6).length;

          setStats({ avg, promoters, passives, detractors, total });
        };
        loadSurveys();
      }, [db, dataVersion]);

      const handleSaveSurvey = async (surveyData) => {
        try {
          const newSurvey = {
            id: Date.now().toString(),
            ...surveyData,
            userId: user.id,
            date: new Date().toISOString().split('T')[0],
            createdAt: new Date().toISOString(),
            createdBy: user.id,
          };
          await dbAdd(db, 'nps', newSurvey);
          setSurveys([newSurvey, ...surveys]);
          setShowNewSurvey(false);
        } catch (err) {
          console.error('Save failed:', err);
          alert('Failed to save. Please try again.');
        }

      return (
        <div className="p-4 space-y-4">
          {/* Stats */}
          <div className="grid grid-cols-2 gap-2">
            <Card className="text-center">
              <div className="text-2xl font-bold text-gl">{stats.avg}</div>
              <p className="text-xs text-gray-600 mt-1">{t.npsAvg}</p>
            </Card>
            <Card className="text-center">
              <div className="text-2xl font-bold text-green-600">{stats.promoters}</div>
              <p className="text-xs text-gray-600 mt-1">{t.promoters}</p>
            </Card>
            <Card className="text-center">
              <div className="text-2xl font-bold text-amber-600">{stats.passives}</div>
              <p className="text-xs text-gray-600 mt-1">{t.passives}</p>
            </Card>
            <Card className="text-center">
              <div className="text-2xl font-bold text-red-600">{stats.detractors}</div>
              <p className="text-xs text-gray-600 mt-1">{t.detractors}</p>

            <Icon name="plus" size={18} /> {t.newSurvey}

            <Card className="text-center py-8 text-gray-500">
              {t.noData}

            <div className="space-y-2">

                  <Card key={survey.id} className="hover:shadow-md">
                    <div className="flex justify-between items-start mb-2">

        </div>

    // REPORTS MODULE
    // ══════════════════════════════════════════════════════════════

    const ReportsPage = ({ t, db, user, isAdmin, dataVersion }) => {
      const [period, setPeriod] = React.useState('thisMonth');
      const [stats, setStats] = React.useState({
        totalEntities: 0,
        totalCalls: 0,
        totalVisits: 0,
      });
      const [chartsData, setChartsData] = React.useState({
        callsByMonth: [],
        visitsByMonth: [],
        topClinics: [],
        npsTrend: [],
      });
      const [benchmarks, setBenchmarks] = React.useState({
        callsChange: 0,
        visitsChange: 0,
        npsChange: 0,
        clinicsAdded: 0,
      });

      React.useEffect(() => {
        const loadReports = async () => {
          const entities = await dbGetAll(db, 'entities');
          const calls = await dbGetAll(db, 'calls');
          const visits = await dbGetAll(db, 'visits');
          const npsData = await dbGetAll(db, 'nps');

          setStats({
            totalEntities: entities.length,
            totalCalls: calls.length,
            totalVisits: visits.length,
          });

          // Build 6-month charts
          const now = new Date();
          const months = [];
          for (let i = 5; i >= 0; i--) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const label = d.toLocaleDateString('default', { month: 'short' });
            const monthStart = new Date(d.getFullYear(), d.getMonth(), 1);
            const monthEnd = new Date(d.getFullYear(), d.getMonth() + 1, 0);
            const callsInMonth = calls.filter(c => {
              const cd = new Date(c.date);
              return cd >= monthStart && cd <= monthEnd;
            }).length;
            const visitsInMonth = visits.filter(v => {
              const vd = new Date(v.date);
              return vd >= monthStart && vd <= monthEnd;
            }).length;
            months.push({ label, calls: callsInMonth, visits: visitsInMonth });
          }

          // Top clinics by visits
          const visitsByClinic = {};
          visits.forEach(v => {
            visitsByClinic[v.entityName] = (visitsByClinic[v.entityName] || 0) + 1;
          });
          const topClinics = Object.entries(visitsByClinic)
            .map(([name, count]) => ({ label: name.substring(0, 12), value: count, color: '#46ac33' }))
            .sort((a, b) => b.value - a.value)
            .slice(0, 5);

          // NPS trend (simple 6-month average)
          const npsByMonth = [];
          for (let i = 5; i >= 0; i--) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const monthStart = new Date(d.getFullYear(), d.getMonth(), 1);
            const monthEnd = new Date(d.getFullYear(), d.getMonth() + 1, 0);
            const npsInMonth = npsData.filter(n => {
              const nd = new Date(n.createdAt || new Date());
              return nd >= monthStart && nd <= monthEnd;
            });
            const avg = npsInMonth.length > 0
              ? (npsInMonth.reduce((sum, n) => sum + n.score, 0) / npsInMonth.length).toFixed(1)
              : 0;
            npsByMonth.push({
              label: d.toLocaleDateString('default', { month: 'short' }),
              value: parseFloat(avg) || 0,
              color: parseFloat(avg) >= 7 ? '#46ac33' : '#f59e0b'
            });
          }

          setChartsData({
            callsByMonth: months.map(m => ({ label: m.label, value: m.calls, color: '#3b82f6' })),
            visitsByMonth: months.map(m => ({ label: m.label, value: m.visits, color: '#10b981' })),
            topClinics,
            npsTrend: npsByMonth,
          });

          // Benchmarks: compare this month vs last month
          const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
          const lastMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1);
          const lastMonthEnd = new Date(now.getFullYear(), now.getMonth(), 0);

          const callsThisMonth = calls.filter(c => new Date(c.date) >= monthStart).length;
          const callsLastMonth = calls.filter(c => {
            const cd = new Date(c.date);
            return cd >= lastMonthStart && cd <= lastMonthEnd;
          }).length;

          const visitsThisMonth = visits.filter(v => new Date(v.date) >= monthStart).length;
          const visitsLastMonth = visits.filter(v => {
            const vd = new Date(v.date);
            return vd >= lastMonthStart && vd <= lastMonthEnd;
          }).length;

          const clinicsThisMonth = entities.filter(e =>
            e.type === 'clinic' && new Date(e.createdAt) >= monthStart
          ).length;
          const clinicsLastMonth = entities.filter(e =>
            e.type === 'clinic' && new Date(e.createdAt) >= lastMonthStart && new Date(e.createdAt) <= lastMonthEnd
          ).length;

          const npsThisMonth = npsData.filter(n => new Date(n.createdAt || new Date()) >= monthStart);
          const npsLastMonth = npsData.filter(n => {
            const nd = new Date(n.createdAt || new Date());
            return nd >= lastMonthStart && nd <= lastMonthEnd;
          });
          const npsAvgThis = npsThisMonth.length > 0
            ? (npsThisMonth.reduce((sum, n) => sum + n.score, 0) / npsThisMonth.length).toFixed(1)
            : 0;
          const npsAvgLast = npsLastMonth.length > 0
            ? (npsLastMonth.reduce((sum, n) => sum + n.score, 0) / npsLastMonth.length).toFixed(1)
            : 0;

          setBenchmarks({
            callsChange: callsThisMonth - callsLastMonth,
            visitsChange: visitsThisMonth - visitsLastMonth,
            npsChange: (parseFloat(npsAvgThis) - parseFloat(npsAvgLast)).toFixed(1),
            clinicsAdded: clinicsThisMonth,
          });
        };

        loadReports();
      }, [db, dataVersion]);

      // Show basic reports to all users, detailed to admin only
      return (
        <div className="p-4 space-y-4">
          <div className="grid grid-cols-2 gap-3">
            <Card className="text-center">
              <div className="text-3xl font-bold text-navy">{stats.totalEntities || 0}</div>
              <p className="text-xs text-gray-600 mt-1">{t.totalClinics}</p>
            </Card>
            <Card className="text-center">
              <div className="text-3xl font-bold text-navy">{stats.totalCalls || 0}</div>
              <p className="text-xs text-gray-600 mt-1">{t.callsThisMonth}</p>
            </Card>
            <Card className="text-center">
              <div className="text-3xl font-bold text-navy">{stats.totalVisits || 0}</div>
              <p className="text-xs text-gray-600 mt-1">{t.visitsThisMonth}</p>
            </Card>
          </div>

          {isAdmin && (
            <>
              {/* Benchmarks */}
              <Card className="bg-amber-50 border border-amber-200">
                <h3 className="font-bold text-navy mb-3">{t.benchmarks}</h3>
                <p className="text-xs text-gray-600 mb-2">{t.lastMonthComparison}</p>
                <div className="grid grid-cols-2 gap-2 text-sm">
                  <div className="flex items-center gap-2 p-2 bg-white rounded border border-amber-100">
                    <Icon name={benchmarks.callsChange >= 0 ? 'trendUp' : 'trendDown'} size={16}
                      className={benchmarks.callsChange >= 0 ? 'text-green-600' : 'text-red-600'} />
                    <div>
                      <p className="text-gray-600 text-xs">📞 Calls</p>
                      <p className="font-bold">{benchmarks.callsChange >= 0 ? '+' : ''}{benchmarks.callsChange}</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-2 p-2 bg-white rounded border border-amber-100">
                    <Icon name={benchmarks.visitsChange >= 0 ? 'trendUp' : 'trendDown'} size={16}
                      className={benchmarks.visitsChange >= 0 ? 'text-green-600' : 'text-red-600'} />
                    <div>
                      <p className="text-gray-600 text-xs">📍 Visits</p>
                      <p className="font-bold">{benchmarks.visitsChange >= 0 ? '+' : ''}{benchmarks.visitsChange}</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-2 p-2 bg-white rounded border border-amber-100">
                    <Icon name={benchmarks.npsChange >= 0 ? 'trendUp' : 'trendDown'} size={16}
                      className={benchmarks.npsChange >= 0 ? 'text-green-600' : 'text-red-600'} />
                    <div>
                      <p className="text-gray-600 text-xs">⭐ NPS</p>
                      <p className="font-bold">{benchmarks.npsChange >= 0 ? '+' : ''}{benchmarks.npsChange}</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-2 p-2 bg-white rounded border border-amber-100">
                    <Icon name="plus" size={16} className="text-blue-600" />
                    <div>
                      <p className="text-gray-600 text-xs">🏥 New Clinics</p>
                      <p className="font-bold">{benchmarks.clinicsAdded}</p>
                    </div>
                  </div>
                </div>
              </Card>

              {/* Charts */}
              <Card>
                <h3 className="font-bold text-navy mb-3">{t.monthlyChart}</h3>
                <p className="text-xs text-gray-600 mb-3">📞 Calls</p>
                <BarChart data={chartsData.callsByMonth} />
              </Card>

              <Card>
                <h3 className="font-bold text-navy mb-3">{t.monthlyChart}</h3>
                <p className="text-xs text-gray-600 mb-3">📍 Visits</p>
                <BarChart data={chartsData.visitsByMonth} />
              </Card>

              {chartsData.topClinics.length > 0 && (
                <Card>
                  <h3 className="font-bold text-navy mb-3">{t.topClinicsByVisits}</h3>
                  <BarChart data={chartsData.topClinics} maxValue={Math.max(...chartsData.topClinics.map(c => c.value))} height={120} />
                </Card>
              )}

              {chartsData.npsTrend.length > 0 && (
                <Card>
                  <h3 className="font-bold text-navy mb-3">{t.npsAvgTrend}</h3>
                  <BarChart data={chartsData.npsTrend} maxValue={10} height={120} />
                </Card>
              )}
            </>
          )}
        </div>
      );
    };

            <Card key={campaign.id} className="hover:shadow-md">
              <div className="flex justify-between items-start mb-2">
                <h3 className="font-bold text-navy">{campaign.name}</h3>
                <Badge variant="navy">{campaign.type}</Badge>
              </div>
              <p className="text-sm text-gray-600 mb-2">{campaign.objective}</p>
              <p className="text-xs text-gray-500">📅 {campaign.week}</p>
            </Card>
          ))}
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════
    // SETTINGS PAGE
    // ══════════════════════════════════════════════════════════════

    const SettingsPage = ({ t, user, db, dataVersion }) => {
      const [claudeKey, setClaudeKey] = React.useState(localStorage.getItem('claude_key') || '');
      const [openaiKey, setOpenaiKey] = React.useState(localStorage.getItem('openai_key') || '');
      const toast = useToast();
      const [importFile, setImportFile] = React.useState(null);

      const handleSaveKeys = () => {
        localStorage.setItem('claude_key', claudeKey);
        localStorage.setItem('openai_key', openaiKey);
        toast?.show?.('API Keys saved!', 'success');
      };

      const handleExportJson = async () => {
        try {
          const stores = ['entities', 'calls', 'visits', 'nps', 'routes', 'chatSessions'];
          const data = {};
          for (const store of stores) {
            data[store] = await dbGetAll(db, store);
          }
          const json = JSON.stringify(data, null, 2);
          const blob = new Blob([json], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'gl-comercial-export-' + new Date().toISOString().split('T')[0] + '.json';
          a.click();
          URL.revokeObjectURL(url);
          toast?.show?.('Data exported as JSON', 'success');
        } catch (err) {
          toast?.show?.('Export failed: ' + err.message, 'error');
        }
      };

      const handleExportCsv = async () => {
        try {
          const entities = await dbGetAll(db, 'entities');
          const clinics = entities.filter(e => e.type === 'clinic');
          const rows = [['Name', 'Region', 'Status', 'Phone', 'Email', 'Address']];
          clinics.forEach(c => {
            rows.push([c.name, c.region, c.clientStatus, c.phone, c.email, c.address]);
          });
          const csv = rows.map(r => r.map(v => `"${(v || '').toString().replace(/"/g, '""')}"`).join(',')).join('\n');
          const blob = new Blob([csv], { type: 'text/csv' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'gl-clinics-' + new Date().toISOString().split('T')[0] + '.csv';
          a.click();
          URL.revokeObjectURL(url);
          toast?.show?.('Clinics exported as CSV', 'success');
        } catch (err) {
          toast?.show?.('Export failed: ' + err.message, 'error');
        }
      };

      const handleImportJson = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          const stores = ['entities', 'calls', 'visits', 'nps', 'routes', 'chatSessions'];
          for (const store of stores) {
            if (data[store] && Array.isArray(data[store])) {
              for (const item of data[store]) {
                await dbPut(db, store, item);
              }
            }
          }
          toast?.show?.('Data imported successfully', 'success');
          setImportFile(null);
        } catch (err) {
          toast?.show?.('Import failed: ' + err.message, 'error');
        }
      };

      return (
        <div className="p-4 space-y-4">
          <h2 className="text-lg font-bold text-navy">{t.apiKeys}</h2>
          <Input
            label={t.claudeApiKey}
            value={claudeKey}
            onChange={setClaudeKey}
            type="password"
            placeholder="sk-ant-..."
          />
          <Input
            label={t.openaiApiKey}
            value={openaiKey}
            onChange={setOpenaiKey}
            type="password"
            placeholder="sk-..."
          />
          <Button onClick={handleSaveKeys} className="w-full justify-center">
            {t.save}
          </Button>

          <div className="border-t pt-4">
            <h2 className="text-lg font-bold text-navy mb-4">{t.exportData}</h2>
            <div className="space-y-2">
              <Button onClick={handleExportJson} className="w-full justify-center">
                <Icon name="download" size={16} /> {t.exportJson}
              </Button>
              <Button onClick={handleExportCsv} className="w-full justify-center">
                <Icon name="download" size={16} /> {t.exportCsv}
              </Button>
            </div>
          </div>

          <div className="border-t pt-4">
            <h2 className="text-lg font-bold text-navy mb-4">{t.importData}</h2>
            <div className="flex gap-2">
              <input
                type="file"
                accept=".json"
                onChange={handleImportJson}
                id="jsonImport"
                style={{display: 'none'}}
              />
              <Button onClick={() => document.getElementById('jsonImport').click()} className="flex-1 justify-center">
                <Icon name="upload" size={16} /> {t.importJson}
              </Button>
            </div>
          </div>

          <div className="border-t pt-4">
            <h2 className="text-lg font-bold text-navy mb-4">{t.userInfo}</h2>
            <Card>
              <p className="text-sm text-gray-600">{t.name}</p>
              <p className="font-medium">{user.name}</p>
              <p className="text-sm text-gray-600 mt-2">{t.email}</p>
              <p className="font-medium">{user.email}</p>
            </Card>
          </div>
        </div>
      );
    };

    // ══════════════════════════════════════════════════════════════
    // AI CHAT OVERLAY
    // ══════════════════════════════════════════════════════════════

    const AIChat = ({ isOpen, onClose, t, user, currentModule }) => {
      const [messages, setMessages] = React.useState([]);
      const [input, setInput] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const [model, setModel] = React.useState('claude');

      const handleSend = async () => {
        if (!input.trim()) return;

        const userMessage = { role: 'user', content: input };
        setMessages([...messages, userMessage]);
        setInput('');
        setLoading(true);

        try {
          const systemPrompt = `You are an AI commercial assistant for Greenlight Pet ER, a 24/7 emergency veterinary hospital. User: ${user.name}, Module: ${currentModule}.

GREENLIGHT PET ER — Services & Competitive Advantages:
- 24/7 Emergency Surgery & Trauma Care with state-of-the-art equipment
- Specialized departments: Surgery, Orthopedics, Dentistry, Internal Medicine, Oncology
- Advanced diagnostics: Digital radiology, ultrasound, laboratory services
- Dedicated emergency response team available at all times
- Partnerships with local clinics for referrals and co-management
- Dedicated support line for partner clinics

PRICING TIERS:
- Basic Partnership: Referral network access, 15% discount for partner's clients
- Premium Partnership: Dedicated support line, custom SLA, 20% discount, marketing materials
- Elite Partnership: Everything above + quarterly business reviews, preferred pricing on special procedures

COMMON OBJECTIONS & REBUTTALS:
1. "We already have an emergency service" → Suggest coexistence model: GL for complex cases, leverage GL's specializations
2. "Price is too high" → Emphasize quality, reduced liability, better client outcomes, long-term cost savings
3. "Don't have volume for partnership" → Flexible minimum volumes, start small and scale
4. "Concerned about client relationships" → GL enhances clinic's reputation, improves client retention

COMMERCIAL TACTICS:
- Frame partnerships as "expanding clinic capabilities" not replacing services
- Highlight client satisfaction through advanced care
- Offer pilot programs (30-day trial partnerships)
- Focus on mutual growth and client welfare
- Use testimonials from existing partners

Help the user with call strategies, follow-ups, objection handling, partnership proposals, and NPS insights.`;

          let response = '';

          const claudeKey = localStorage.getItem('claude_key');
          if (model === 'claude' && claudeKey) {
            response = 'Claude API response would appear here (requires CORS-enabled API or backend proxy).';
          } else {
            response = 'Demo response: How can I assist you with your commercial activities?';
          }

          setMessages(prev => [...prev, { role: 'assistant', content: response }]);
        } catch (err) {
          setMessages(prev => [...prev, { role: 'assistant', content: 'Error: ' + err.message }]);
        } finally {
          setLoading(false);
        }
      };

      if (!isOpen) return null;

      return (
        <>
          <div className="modal-overlay" onClick={onClose}></div>
          <Sheet isOpen={isOpen} onClose={onClose} title={t.aiAssist}>
            <div className="flex flex-col gap-4 h-[60vh]">
              {/* Model selector */}
              <Select
                label="Model"
                value={model}
                onChange={setModel}
                options={['claude', 'openai']}
              />

              {/* Messages */}
              <div className="flex-1 overflow-y-auto space-y-3 border-t pt-3">
                {messages.length === 0 ? (
                  <p className="text-sm text-gray-500 text-center py-4">{t.typeMessage}</p>
                ) : (
                  messages.map((msg, i) => (
                    <div
                      key={`${msg.role}-${i}`}
                      className={`p-3 rounded-[8px] text-sm ${
                        msg.role === 'user'
                          ? 'bg-gl text-white ml-8'
                          : 'bg-gray-100 text-gray-900 mr-8'
                      }`}
                    >
                      {msg.content}
                    </div>
                  ))
                )}
                {loading && <p className="text-xs text-gray-500 text-center">Thinking...</p>}
              </div>

              {/* Input */}
              <div className="flex gap-2 border-t pt-3">
                <input
                  type="text"
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                  placeholder={t.typeMessage}
                  className="flex-1 px-3 py-2 border border-gray-300 rounded-[8px]"
                />
                <button
                  onClick={handleSend}
                  disabled={loading}
                  className="px-4 py-2 bg-gl text-white rounded-[8px] hover:bg-gl-dark"
                >
                  <Icon name="send" size={18} />
                </button>
              </div>
            </div>
          </Sheet>
        </>
      );
    };

    // ══════════════════════════════════════════════════════════════
    // MAIN APP COMPONENT
    // ══════════════════════════════════════════════════════════════

    const App = () => {
      const [lang, setLang] = React.useState(() => localStorage.getItem('lang') || 'pt');
      const [user, setUser] = React.useState(null);
      const [db, setDb] = React.useState(null);
      const [activeTab, setActiveTab] = React.useState('home');
      const [menuOpen, setMenuOpen] = React.useState(false);
      const [aiOpen, setAiOpen] = React.useState(false);
      const [moreOpen, setMoreOpen] = React.useState(false);
      const [isOnline, setIsOnline] = React.useState(navigator.onLine);
      const [showNewCall, setShowNewCall] = React.useState(false);
      const [showNewVisit, setShowNewVisit] = React.useState(false);
      const [showNewSurvey, setShowNewSurvey] = React.useState(false);
      const [showNewClinic, setShowNewClinic] = React.useState(false);
      const [dataVersion, setDataVersion] = React.useState(0);

      const t = translations[lang];

      // Initialize DB and load default users
      React.useEffect(() => {
        const setupDB = async () => {
          const database = await initDB();
          setDb(database);

          const existingUsers = await dbGetAll(database, 'users');
          if (existingUsers.length === 0) {
            const defaultUsers = [
              { id: 'admin1', name: 'Vinicius', email: 'vm@glpethospital.com', role: 'admin', unit: 'jax' },
              { id: 'emp1', name: 'Sales Rep', email: 'rep@glpethospital.com', role: 'employee', unit: 'jax' },
            ];
            for (const user of defaultUsers) {
              const passwordHash = await hashPassword('gl2026');
              await dbPut(database, 'users', { ...user, password: passwordHash });
            }
          }
        };
        setupDB();
      }, []);

      React.useEffect(() => {
        localStorage.setItem('lang', lang);
      }, [lang]);

      // Session timeout (30 min)
      React.useEffect(() => {
        if (!user) return;
        let timeout;
        const resetTimer = () => {
          clearTimeout(timeout);
          timeout = setTimeout(() => {
            localStorage.removeItem('claude_key');
            localStorage.removeItem('openai_key');
            setUser(null);
          }, 30 * 60 * 1000);
        };
        const events = ['mousedown', 'keydown', 'touchstart', 'scroll'];
        events.forEach(e => document.addEventListener(e, resetTimer));
        resetTimer();
        return () => {
          clearTimeout(timeout);
          events.forEach(e => document.removeEventListener(e, resetTimer));
        };
      }, [user]);

      // Network status
      React.useEffect(() => {
        const goOnline = () => setIsOnline(true);
        const goOffline = () => setIsOnline(false);
        window.addEventListener('online', goOnline);
        window.addEventListener('offline', goOffline);
        return () => {
          window.removeEventListener('online', goOnline);
          window.removeEventListener('offline', goOffline);
        };
      }, []);

      if (!db) return (
        <div className="flex flex-col items-center justify-center min-h-screen gap-4">
          <div className="animate-spin rounded-full h-12 w-12 border-4 border-gl border-t-transparent"></div>
          <p className="text-navy font-medium">GL.COMERCIAL v2.0</p>
          <p className="text-sm text-gray-500">Initializing...</p>
        </div>
      );
      if (!user) return (
        <LangContext.Provider value={{ t, lang, setLang }}>
          <ToastProvider>
            <LoginScreen onLogin={setUser} db={db} />
          </ToastProvider>
        </LangContext.Provider>
      );

      const pageTitle = {
        home: t.home,
        calls: t.calls,
        clinics: t.clinics,
        businesses: t.businesses,
        visits: t.visits,
        routes: t.routes,
        calendar: t.calendar,
        team: t.teamManagement,
        agenda: t.agenda,
        scripts: t.scripts,
        nps: t.nps,
        reports: t.reports,
        campaigns: t.campaigns,
        manager: t.manager,
      }[activeTab] || t.home;

      return (
        <LangContext.Provider value={{ t, lang, setLang }}>
          <ToastProvider>
            <div className="bg-gray-50 min-h-screen flex flex-col">
              <TopBar
                title={pageTitle}
                onMenuClick={() => setMenuOpen(true)}
                onAIClick={() => setAiOpen(true)}
                lang={lang}
                setLang={setLang}
                isOnline={isOnline}
              />

              <div className="flex-1 overflow-y-auto pb-20">
                {activeTab === 'home' && <HomePage t={t} db={db} user={user} lang={lang} dataVersion={dataVersion} />}
                {activeTab === 'calls' && <CallsPage t={t} db={db} user={user} dataVersion={dataVersion} />}
                {activeTab === 'clinics' && <ClinicsPage t={t} db={db} user={user} dataVersion={dataVersion} />}
                {activeTab === 'businesses' && <BusinessesPage t={t} db={db} user={user} dataVersion={dataVersion} />}
                {activeTab === 'visits' && <VisitsPage t={t} db={db} user={user} dataVersion={dataVersion} />}
                {activeTab === 'routes' && <RoutesPage t={t} db={db} user={user} dataVersion={dataVersion} />}
                {activeTab === 'calendar' && <CalendarPage t={t} db={db} user={user} dataVersion={dataVersion} />}
                {activeTab === 'team' && <TeamManagementPage t={t} db={db} user={user} dataVersion={dataVersion} />}
                {activeTab === 'agenda' && <CalendarPage t={t} db={db} user={user} dataVersion={dataVersion} />}
                {activeTab === 'scripts' && <SalesScriptsPage t={t} db={db} user={user} dataVersion={dataVersion} />}
                {activeTab === 'nps' && <NPSPage t={t} db={db} user={user} dataVersion={dataVersion} />}
                {activeTab === 'reports' && <ReportsPage t={t} db={db} user={user} isAdmin={user.role === 'admin'} dataVersion={dataVersion} />}
                {activeTab === 'campaigns' && <CampaignsPage t={t} dataVersion={dataVersion} />}
                {activeTab === 'settings' && <SettingsPage t={t} user={user} db={db} dataVersion={dataVersion} />}
              </div>

              <BottomNav activeTab={activeTab} onTabChange={(tab) => {
                if (tab === 'more') {
                  setMoreOpen(true);
                } else {
                  setActiveTab(tab);
                }
              }} />

              <QuickActionsFAB
                onNewCall={() => setShowNewCall(true)}
                onNewVisit={() => setShowNewVisit(true)}
                onNewSurvey={() => setShowNewSurvey(true)}
                onNewClinic={() => setShowNewClinic(true)}
                t={t}
              />

              {/* FAB-triggered modals */}
              <NewCallModal
                isOpen={showNewCall}
                onClose={() => setShowNewCall(false)}
                onSave={async (data) => {
                  const newCall = { id: Date.now().toString(), ...data, userId: user.id, date: new Date().toISOString().split('T')[0], createdAt: new Date().toISOString() };
                  await dbAdd(db, 'calls', newCall);
                  setDataVersion(v => v + 1);
                  setShowNewCall(false);
                }}
                t={t}
                db={db}
              />
              <NewVisitModal
                isOpen={showNewVisit}
                onClose={() => setShowNewVisit(false)}
                onSave={async (data) => {
                  const newVisit = { id: Date.now().toString(), ...data, userId: user.id, date: new Date().toISOString().split('T')[0], createdAt: new Date().toISOString() };
                  await dbAdd(db, 'visits', newVisit);
                  setDataVersion(v => v + 1);
                  setShowNewVisit(false);
                }}
                t={t}
              />
              <NewSurveyModal
                isOpen={showNewSurvey}
                onClose={() => setShowNewSurvey(false)}
                onSave={async (data) => {
                  const newSurvey = { id: Date.now().toString(), ...data, userId: user.id, date: new Date().toISOString().split('T')[0], createdAt: new Date().toISOString() };
                  await dbAdd(db, 'nps', newSurvey);
                  setDataVersion(v => v + 1);
                  setShowNewSurvey(false);
                }}
                t={t}
              />
              <NewClinicModal
                isOpen={showNewClinic}
                onClose={() => setShowNewClinic(false)}
                onSave={async (data) => {
                  const newClinic = { id: Date.now().toString(), type: 'clinic', ...data, createdAt: new Date().toISOString(), createdBy: user.id };
                  await dbAdd(db, 'entities', newClinic);
                  setDataVersion(v => v + 1);
                  setShowNewClinic(false);
                }}
                t={t}
              />

              <SideDrawer
                isOpen={menuOpen}
                onClose={() => setMenuOpen(false)}
                user={user}
                onLogout={() => {
                  localStorage.removeItem('claude_key');
                  localStorage.removeItem('openai_key');
                  setUser(null);
                }}
                isAdmin={user.role === 'admin'}
                onNavigate={(tab) => setActiveTab(tab)}
              />

              <MoreMenu
                isOpen={moreOpen}
                onClose={() => setMoreOpen(false)}
                onNavigate={(tab) => setActiveTab(tab)}
                t={t}
                isAdmin={user.role === 'admin'}
              />

              <AIChat
                isOpen={aiOpen}
                onClose={() => setAiOpen(false)}
                t={t}
                user={user}
                currentModule={activeTab}
              />
            </div>
          </ToastProvider>
        </LangContext.Provider>
      );
    };

    // ══════════════════════════════════════════════════════════════
    // RENDER
    // ══════════════════════════════════════════════════════════════

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
